name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: CLI tests
        run: npm test
        working-directory: cli
      - name: Todo app example tests
        run: npm test
        working-directory: examples/todo-app
      - name: AIEF verify
        run: node cli/bin/aief.js verify
